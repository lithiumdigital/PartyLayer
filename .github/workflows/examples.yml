name: Examples

# Runs example and app builds against the current state of @partylayer/*
# on npm. Decoupled from ci.yml so that PR merges are not blocked by
# example builds reproducing transient publish-state issues (e.g., during
# a recovery wave). Surfaces breakage via scheduled runs.

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC. Enough to catch regressions within a day of any
    # publish, without spending many CI minutes.
    - cron: '0 6 * * *'

jobs:
  build-examples:
    name: Build example consumers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Version is read from the root package.json `packageManager` field.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all workspace targets including examples
        # Unlike ci.yml (which scopes to @partylayer/* to stay green during
        # recovery waves), this workflow builds everything — examples and
        # apps included — so that workspace-side build breakage surfaces.
        #
        # --workspace-concurrency=1 (serial) is REQUIRED, not just tidiness:
        # tsup uses `clean: true`, so a dep rebuild can transiently remove e.g.
        # packages/provider/dist/index.mjs while apps/demo's `next build` is
        # reading it → "No such file or directory" (a nondeterministic race the
        # scheduled canary tripped on 2026-06-10). Serial build removes the overlap.
        run: pnpm -r --workspace-concurrency=1 build

      - name: Summary
        if: always()
        run: |
          echo "Examples build status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monorepo build canary: runs a workspace-wide \`pnpm -r build\` over" >> $GITHUB_STEP_SUMMARY
          echo "ALL targets — packages, apps, and examples (e.g. wallet-balance-loop)." >> $GITHUB_STEP_SUMMARY
          echo "Examples reference \`@partylayer/*\` via \`workspace:^\`, so this builds" >> $GITHUB_STEP_SUMMARY
          echo "them against the LOCAL workspace sources, not the npm-published versions." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A failure here usually means one of:" >> $GITHUB_STEP_SUMMARY
          echo "  1. A build-orchestration issue (e.g. concurrent dist clean/read across" >> $GITHUB_STEP_SUMMARY
          echo "     workspace builds — hence \`--workspace-concurrency=1\`), or" >> $GITHUB_STEP_SUMMARY
          echo "  2. A workspace package that no longer builds, or a consumer (app/example)" >> $GITHUB_STEP_SUMMARY
          echo "     that no longer compiles against the current workspace sources." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "NOTE: this does NOT verify the npm-PUBLISHED packages (workspace:^ links" >> $GITHUB_STEP_SUMMARY
          echo "local sources). Published-coherence is checked separately by" >> $GITHUB_STEP_SUMMARY
          echo "\`pnpm validate:publish\`. A true published-consumer canary (install" >> $GITHUB_STEP_SUMMARY
          echo "@partylayer/* from npm into a clean dir at the example's declared ranges," >> $GITHUB_STEP_SUMMARY
          echo "then build) is tracked as a backlog item." >> $GITHUB_STEP_SUMMARY
